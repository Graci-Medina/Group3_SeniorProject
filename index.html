<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CopyCook</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Shrikhand&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="splash.css">
</head>
<body>
    <div class="page-wrapper" id="pageWrapper">
        <nav class="navbar">
            <div class="logo">
                <img src="logo.png" alt="CopyCook Logo">
            </div>
            <div class="nav-links">
                <a href="#about">About</a>
                <a href="#contact">Contact</a>
                <button class="login-btn" id="loginBtn">Login</button>
            </div>
        </nav>
        <section class="hero">
            <div class="brand-text">CopyCook</div>
            <img src="tagline.png" class="tagline-img" alt="cook what you crave">

            <div class="plates-track" id="platesTrack">
                <div class="plate">
                    <img src="salad.png" alt="Salad"
                         onerror="this.onerror=null;this.src='https://www.themealdb.com/images/media/meals/sytuqu1511553755.jpg'">
                </div>
                <div class="plate">
                    <img src="cake.png" alt="Cake"
                         onerror="this.onerror=null;this.src='https://www.themealdb.com/images/media/meals/xvsurr1511719182.jpg'">
                </div>
                <div class="plate">
                    <img src="bibimbap.png" alt="Bibimbap"
                         onerror="this.onerror=null;this.src='https://www.themealdb.com/images/media/meals/1529446352.jpg'">
                </div>
            </div>
        </section>
    </div>
    <script src="splash.js"></script>
</body>
</html>
