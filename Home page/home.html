<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CopyCook - Home</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
<!-- Sidebar Navigation -->
        <aside class="sidebar">
            <div class="logo">
                <img src="logo.png" alt="CopyCook Logo">
            </div>
            <nav class="nav-icons">
                <a href="home.html" class="nav-icon active">
                    <img src="home-icon.png" alt="Home">
                </a>
                <a href="../explore/explore.html" class="nav-icon">
                    <img src="explore-icon.png" alt="Explore">
                </a>
                <a href="#" class="nav-icon">
                    <img src="plus-icon.png" alt="Add">
                </a>
                <a href="../Saved page/saved.html" class="nav-icon">
                    <img src="save-icon.png" alt="Saved">
                </a>
                <a href="#" class="nav-icon">
                    <img src="message.png" alt="Messages">
                    <span class="notification-badge">10</span>
                </a>
            </nav>
            <div class="nav-bottom">
                <a href="#" class="nav-icon" onclick="toggleLogoutPopup(event)">
                    <img src="settings-icon.png" alt="Settings">
                </a>
            </div>
        </aside>
<!-- Main Content -->
        <main class="main-content">
<!-- Search Bar -->
            <div class="search-container">
                <div class="search-bar">
                    <svg class="search-icon" width="24" height="24" viewBox="0 0 24 24" fill="none">
                        <circle cx="11" cy="11" r="7" stroke="#5A5A5A" stroke-width="2"/>
                        <path d="M16 16L20 20" stroke="#5A5A5A" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                    <input type="text" placeholder="Search restaurants or dishes">
                    <svg class="mic-icon" width="24" height="24" viewBox="0 0 24 24" fill="none">
                        <rect x="10" y="5" width="4" height="10" rx="2" fill="#D4A5A5"/>
                        <path d="M7 12C7 14.7614 9.23858 17 12 17C14.7614 17 17 14.7614 17 12" stroke="#D4A5A5" stroke-width="2"/>
                        <line x1="12" y1="17" x2="12" y2="20" stroke="#D4A5A5" stroke-width="2"/>
                        <line x1="9" y1="20" x2="15" y2="20" stroke="#D4A5A5" stroke-width="2"/>
                    </svg>
                </div>
                <div class="profile-pic" id="profileAvatar">
                    <img src="drakepfp.png" alt="Profile">
                </div>
            </div>
<!-- Food Grid — populated by script.js -->
            <div class="food-grid" id="foodGrid"></div>
        </main>
    </div>
<!-- Logout Popup -->
    <div id="logoutPopup" class="logout-popup">
        <div class="logout-content">
            <h3>Account Settings</h3>
            <button class="logout-btn" onclick="handleLogout()">Log Out</button>
            <button class="cancel-btn" onclick="closeLogoutPopup()">Cancel</button>
        </div>
    </div>

    <!-- Folder Picker Popup -->
    <div id="folderPickerOverlay" class="folder-picker-overlay">
        <div class="folder-picker-popup" id="folderPickerPopup">
            <div class="folder-picker-header">
                <span>Save to folder</span>
                <button class="folder-picker-close" onclick="closeFolderPicker()">&times;</button>
            </div>
            <div class="folder-picker-body" id="folderPickerBody"></div>
            <div class="folder-picker-footer">
                <button class="folder-create-btn" onclick="openCreateFolder()">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
                        <path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
                    </svg>
                    Create new folder
                </button>
            </div>
        </div>
    </div>

    <!-- Create Folder Popup -->
    <div id="createFolderOverlay" class="folder-picker-overlay">
        <div class="folder-picker-popup" id="createFolderPopup">
            <div class="folder-picker-header">
                <span>New folder</span>
                <button class="folder-picker-close" onclick="closeCreateFolder()">&times;</button>
            </div>
            <div class="folder-picker-body" style="padding:16px 20px 8px;">
                <input type="text" id="newFolderName" class="folder-name-input" placeholder="Folder name…" maxlength="40" onkeydown="if(event.key==='Enter') confirmCreateFolder()">
                <div id="createFolderError" class="folder-error"></div>
            </div>
            <div class="folder-picker-footer">
                <button class="folder-create-btn" onclick="confirmCreateFolder()" style="justify-content:center;">
                    Create &amp; save
                </button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
