<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CopyCook - Home</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
<!-- Sidebar Navigation -->
        <aside class="sidebar">
            <div class="logo">
                <img src="logo.png" alt="CopyCook Logo">
            </div>
            <nav class="nav-icons">
                <a href="home.html" class="nav-icon active">
                    <img src="home-icon.png" alt="Home">
                </a>
                <a href="../explore/explore.html" class="nav-icon">
                    <img src="explore-icon.png" alt="Explore">
                </a>
                <a href="#" class="nav-icon">
                    <img src="plus-icon.png" alt="Add">
                </a>
                <a href="../Saved page/saved.html" class="nav-icon">
                    <img src="save-icon.png" alt="Saved">
                </a>
                <a href="#" class="nav-icon">
                    <img src="message.png" alt="Messages">
                    <span class="notification-badge">10</span>
                </a>
            </nav>
            <div class="nav-bottom">
                <a href="#" class="nav-icon" onclick="toggleLogoutPopup(event)">
                    <img src="settings-icon.png" alt="Settings">
                </a>
            </div>
        </aside>
<!-- Main Content -->
        <main class="main-content">
<!-- Search Bar -->
            <div class="search-container">
                <div class="search-bar">
                    <svg class="search-icon" width="24" height="24" viewBox="0 0 24 24" fill="none">
                        <circle cx="11" cy="11" r="7" stroke="#5A5A5A" stroke-width="2"/>
                        <path d="M16 16L20 20" stroke="#5A5A5A" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                    <input type="text" placeholder="Search restaurants or dishes">
                    <svg class="mic-icon" width="24" height="24" viewBox="0 0 24 24" fill="none">
                        <rect x="10" y="5" width="4" height="10" rx="2" fill="#D4A5A5"/>
                        <path d="M7 12C7 14.7614 9.23858 17 12 17C14.7614 17 17 14.7614 17 12" stroke="#D4A5A5" stroke-width="2"/>
                        <line x1="12" y1="17" x2="12" y2="20" stroke="#D4A5A5" stroke-width="2"/>
                        <line x1="9" y1="20" x2="15" y2="20" stroke="#D4A5A5" stroke-width="2"/>
                    </svg>
                </div>
                <div class="profile-pic" id="profileAvatar">
                    <img src="drakepfp.png" alt="Profile">
                </div>
            </div>
<!-- Food Grid — populated by script.js -->
            <div class="food-grid" id="foodGrid"></div>
        </main>
    </div>
<!-- Logout Popup -->
    <div id="logoutPopup" class="logout-popup">
        <div class="logout-content">
            <h3>Account Settings</h3>
            <button class="logout-btn" onclick="handleLogout()">Log Out</button>
            <button class="cancel-btn" onclick="closeLogoutPopup()">Cancel</button>
        </div>
    </div>

    <!-- Save to Folder Popup -->
    <div id="savePopupOverlay" class="save-popup-overlay" onclick="closeSavePopup(event)">
        <div class="save-popup">
            <h2 class="save-popup-title">Save</h2>
            <div class="save-search-bar">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
                    <circle cx="11" cy="11" r="7" stroke="#D4A5A5" stroke-width="2"/>
                    <path d="M16 16L20 20" stroke="#D4A5A5" stroke-width="2" stroke-linecap="round"/>
                </svg>
                <input type="text" id="folderSearchInput" placeholder="" oninput="filterFolders(this.value)">
            </div>
            <p class="save-popup-label">All folders</p>
            <div class="save-folders-list" id="saveFoldersList"></div>
            <button class="save-create-folder-btn" onclick="openSaveCreateFolder()">
                <span class="save-create-plus">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
                        <circle cx="12" cy="12" r="10" fill="#9FB19F"/>
                        <path d="M12 7v10M7 12h10" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
                    </svg>
                </span>
                Create Folder
            </button>
        </div>
    </div>

    <!-- Create Folder Sub-popup -->
    <div id="createFolderPopup" class="save-popup-overlay" onclick="closeCreateFolderPopup(event)">
        <div class="save-popup">
            <h2 class="save-popup-title">New Folder</h2>
            <input type="text" id="newFolderNameInput" class="new-folder-input" placeholder="Folder name" maxlength="40">
            <div class="folder-privacy-row">
                <button class="privacy-opt selected" id="privOptPrivate" onclick="selectSavePrivacy('private')">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                        <rect x="5" y="11" width="14" height="10" rx="2" stroke="currentColor" stroke-width="2" fill="none"/>
                        <path d="M8 11V7a4 4 0 0 1 8 0v4" stroke="currentColor" stroke-width="2" fill="none"/>
                    </svg>
                    Private
                </button>
                <button class="privacy-opt" id="privOptPublic" onclick="selectSavePrivacy('public')">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                        <circle cx="12" cy="12" r="4" stroke="currentColor" stroke-width="2" fill="none"/>
                        <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7z" stroke="currentColor" stroke-width="2" fill="none"/>
                    </svg>
                    Public
                </button>
            </div>
            <div class="save-popup-actions">
                <button class="sp-cancel-btn" onclick="closeCreateFolderPopup()">Cancel</button>
                <button class="sp-confirm-btn" onclick="confirmCreateFolder()">Create</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
